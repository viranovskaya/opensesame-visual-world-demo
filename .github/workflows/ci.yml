name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test tools
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest

      - name: Rebuild generated demo files
        run: |
          python scripts/generate_demo_assets.py
          python scripts/build_experiment.py
          git diff --exit-code -- assets experiment
